<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - CampusThread</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Load saved theme synchronously to prevent flash -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6f00d2;
            --secondary-color: #fff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --bg-light: #f8f9fa;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --primary-color: #b085ff;
            --secondary-color: #1f1f2e;
            --success-color: #66bb6a;
            --danger-color: #ef5350;
            --warning-color: #ffb74d;
            --info-color: #29b6f6;
            --text-dark: #e5e5f7;
            --text-light: #b8b8ca;
            --bg-light: #101120;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-container {
            background-color: var(--secondary-color);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2rem;
            margin: 2rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary-color);
            text-decoration: none;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .login-logo span {
            color: var(--text-dark);
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        /* ===== FORM GROUP ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background-color: var(--secondary-color);
            color: var(--text-dark);
        }

        [data-theme="dark"] .form-group input {
            border-color: #444;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(111, 0, 210, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-light);
        }

        /* ===== REMEMBER & FORGOT ===== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .remember-me label {
            cursor: pointer;
            margin: 0;
            font-weight: 500;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* ===== LOGIN BUTTON ===== */
        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            background-color: #5a00a8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(111, 0, 210, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-light);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #ddd;
        }

        [data-theme="dark"] .divider::before,
        [data-theme="dark"] .divider::after {
            background-color: #444;
        }

        .divider span {
            margin: 0 1rem;
            font-size: 0.9rem;
        }

        /* ===== SIGNUP LINK ===== */
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background-color: var(--secondary-color);
            border: 2px solid #ddd;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--text-dark);
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .theme-toggle {
            border-color: #444;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* ===== SECURITY INFO ===== */
        .security-info {
            background-color: var(--bg-light);
            border-left: 4px solid var(--info-color);
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .security-info i {
            color: var(--info-color);
            margin-top: 0.25rem;
            flex-shrink: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .login-container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .theme-toggle {
                top: 1rem;
                right: 1rem;
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-header">
            <a href="index.html" class="login-logo">Campus<span>Thread</span></a>
            <h1 class="login-title">Super Admin Login</h1>
            <p class="login-subtitle">Enter your credentials to access the admin dashboard</p>
        </div>

        <form id="loginForm">
            <!-- Email Field -->
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Social Login (Optional) -->
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 1rem;">Sign in with</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button type="button" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ddd; background: var(--secondary-color); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition);" title="Sign in with Google">
                    <i class="fab fa-google" style="color: var(--text-dark);"></i>
                </button>
                <button type="button" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ddd; background: var(--secondary-color); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition);" title="Sign in with GitHub">
                    <i class="fab fa-github" style="color: var(--text-dark);"></i>
                </button>
            </div>
        </div>

        <!-- Signup Link -->
        <div class="signup-link">
            Don't have an account? <a href="superadmin-register.html">Create one</a>
        </div>

        <!-- Security Info -->
        <div class="security-info">
            <i class="fas fa-shield-alt"></i>
            <p>Only authorized super admins can access this portal. Unauthorized access attempts are logged.</p>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            themeToggle.innerHTML = newTheme === 'dark' ? 
                '<i class="fas fa-sun"></i>' : 
                '<i class="fas fa-moon"></i>';
        });

        // Update icon based on initial theme
        const currentTheme = htmlElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

        // Form Submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // TODO: Replace with actual authentication logic
            console.log('Login attempt:', { email, password, rememberMe });
            
            // Simulated login (replace with actual API call)
            if (email && password) {
                alert('Login submitted! (This is a demo - integrate with backend API)');
                // Redirect to dashboard after successful login
                // window.location.href = 'superadmin.html';
            }
        });

        // Password visibility toggle (optional enhancement)
        const passwordField = document.getElementById('password');
        const passwordLabel = passwordField.previousElementSibling;
        
        // Add show/hide password icon
        const togglePasswordBtn = document.createElement('button');
        togglePasswordBtn.type = 'button';
        togglePasswordBtn.style.cssText = 'position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-light);';
        togglePasswordBtn.innerHTML = '<i class="fas fa-eye"></i>';
        
        const passwordGroup = passwordField.parentElement;
        passwordGroup.style.position = 'relative';
        passwordGroup.appendChild(togglePasswordBtn);
        
        togglePasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const type = passwordField.type === 'password' ? 'text' : 'password';
            passwordField.type = type;
            togglePasswordBtn.innerHTML = type === 'password' ? 
                '<i class="fas fa-eye"></i>' : 
                '<i class="fas fa-eye-slash"></i>';
        });
    </script>
</body>

</html>
