<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar - CampusThread</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6f00d2;
            --secondary-color: #fff;
            --bg-light: #f8f9fa;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --border-radius: 10px;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --primary-color: #b085ff;
            --secondary-color: #1f1f2e;
            --bg-light: #101120;
            --text-dark: #e5e5f7;
            --text-light: #b8b8ca;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.4;
        }

        .header {
            position: sticky;
            top: 0;
            width: 100%;
            background: var(--secondary-color);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            gap: 1rem;
        }

        .logo {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .logo span {
            color: var(--text-dark);
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 1.2rem;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            padding: 0.45rem 0.7rem;
            border-radius: 8px;
            transition: var(--transition);
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(111, 0, 210, 0.12);
            color: var(--primary-color);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .hamburger {
            border: none;
            background: transparent;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
        }

        .hamburger span {
            width: 24px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 2px;
            transition: var(--transition);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(4px, 4px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(4px, -4px);
        }

        /* Mobile Menu Overlay */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: var(--secondary-color);
            z-index: 1000;
            flex-direction: column;
            overflow-y: auto;
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu-header {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            background: var(--secondary-color);
            z-index: 1001;
        }

        .close-menu {
            background: none;
            border: none;
            font-size: 2.5rem;
            color: var(--text-dark);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        .close-menu:hover {
            background: rgba(0,0,0,0.1);
        }

        .mobile-nav-links {
            list-style: none;
            padding: 3rem 2rem;
            margin: 0;
            flex: 1;
        }

        .mobile-nav-links li {
            margin-bottom: 1.5rem;
        }

        .mobile-nav-links a {
            display: block;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.4rem;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .mobile-nav-links a:hover {
            background: rgba(111, 0, 210, 0.12);
            color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            .nav-right {
                gap: 0.4rem;
            }
            #themeToggle {
                font-size: 0.9rem;
                padding: 0.4rem 0.7rem;
            }
        }

        .page-demo {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            font-size: 0.95rem;
        }

        .page-demo h2 {
            margin-bottom: 0.7rem;
        }

        .page-demo p {
            margin-bottom: 0.6rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo">Campus<span>Thread</span></a>

            <div class="nav-right">
                <button id="themeToggle" class="btn" aria-label="Toggle dark/light mode">🌙</button>
                <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

            <!-- Mobile Menu Overlay -->
            <div class="mobile-menu" id="mobileMenu">
                <div class="mobile-menu-header">
                    <button class="close-menu" id="closeMenu" aria-label="Close menu">×</button>
                </div>
                <ul class="mobile-nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shops</a></li>
                    <li><a href="index.html#universities">Universities</a></li>
                    <li><a href="index.html#brands">Brands</a></li>
                    <li><a href="vendoradmin.html">Vendor Admin</a></li>
                </ul>
            </div>
        </nav>
    </header>

   
    <script>
        const hamburger = document.getElementById('hamburger');
        const closeMenu = document.getElementById('closeMenu');
        const mobileMenu = document.getElementById('mobileMenu');

        function toggleMenu() {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        }

        function closeMobileMenu() {
            hamburger.classList.remove('active');
            mobileMenu.classList.remove('active');
        }

        hamburger.addEventListener('click', toggleMenu);
        closeMenu.addEventListener('click', closeMobileMenu);

        // Close menu when clicking on links
        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        // Close menu when clicking outside
        mobileMenu.addEventListener('click', (e) => {
            if (e.target === mobileMenu) {
                closeMobileMenu();
            }
        });

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = theme === 'dark' ? '☀️' : '🌙';
            themeToggle.textContent = icon;
            localStorage.setItem('campusThreadTheme', theme);
        }

        function initTheme() {
            const saved = localStorage.getItem('campusThreadTheme') || 'light';
            setTheme(saved);
            themeToggle.addEventListener('click', () => {
                setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            });
        }

        initTheme();
    </script>
</body>
</html>
