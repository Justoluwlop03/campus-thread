<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Admin Dashboard - CampusThread</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6f00d2;
            --secondary-color: #fff;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --bg-light: #f8f9fa;
            --border-radius: 12px;
            --transition: all 0.3s ease;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
        }

        [data-theme="dark"] {
            --primary-color: #b085ff;
            --secondary-color: #1f1f2e;
            --text-dark: #e5e5f7;
            --text-light: #b8b8ca;
            --bg-light: #101120;
            --border-radius: 12px;
            --transition: all 0.3s ease;
            --success: #66bb6a;
            --warning: #ffb74d;
            --danger: #ef5350;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            width: 100%;
            background: var(--secondary-color);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            gap: 1rem;
        }

        .logo {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .logo span {
            color: var(--text-dark);
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 1.2rem;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            padding: 0.45rem 0.7rem;
            border-radius: 8px;
            transition: var(--transition);
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(111, 0, 210, 0.12);
            color: var(--primary-color);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .hamburger {
            display: none;
            border: none;
            background: transparent;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
        }

        .hamburger span {
            width: 24px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 2px;
            transition: var(--transition);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(4px, 4px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(4px, -4px);
        }

        /* Mobile Menu Overlay */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: var(--secondary-color);
            z-index: 1000;
            flex-direction: column;
            overflow-y: auto;
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu-header {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            background: var(--secondary-color);
            z-index: 1001;
        }

        .close-menu {
            background: none;
            border: none;
            font-size: 2.5rem;
            color: var(--text-dark);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        .close-menu:hover {
            background: rgba(0,0,0,0.1);
        }

        .mobile-nav-links {
            list-style: none;
            padding: 3rem 2rem;
            margin: 0;
            flex: 1;
        }

        .mobile-nav-links li {
            margin-bottom: 1.5rem;
        }

        .mobile-nav-links a {
            display: block;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.4rem;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .mobile-nav-links a:hover {
            background: rgba(111, 0, 210, 0.12);
            color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }
            
            .nav-links {
                display: none !important;
            }
            
            .nav-right {
                gap: 0.4rem;
            }
            
            #themeToggle {
                font-size: 0.9rem;
                padding: 0.4rem 0.7rem;
            }
        }
        
        @media (max-width: 1024px) {
            .nav-right {
                gap: 0.4rem;
            }
            #themeToggle {
                font-size: 0.9rem;
                padding: 0.4rem 0.7rem;
            }
        }

        .header-right {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-light);
            border-radius: var(--border-radius);
        }

        .user-badge i {
            color: var(--primary-color);
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }

        /* ===== TABS NAVIGATION ===== */
        .tabs-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 1rem 2rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 3px solid transparent;
            transition: var(--transition);
            position: relative;
            bottom: -2px;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        /* ===== TAB CONTENT ===== */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== UPLOAD FORM ===== */
        .form-container {
            background: var(--secondary-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 2rem;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            width: 100%;
            min-height: 44px;
            box-sizing: border-box;
        }
        
        .form-group textarea {
            min-height: 100px;
        }

        .form-group input[type="file"] {
            padding: 0.5rem;
            cursor: pointer;
        }

        .form-group input[type="file"]::file-selector-button {
            padding: 0.5rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            margin-right: 1rem;
            transition: var(--transition);
        }

        .form-group input[type="file"]::file-selector-button:hover {
            background-color: #5a0099;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(111, 0, 210, 0.1);
        }

        .form-group textarea {
            resize: none;
            grid-column: 1 / -1;
            min-height: 100px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .image-preview-container {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-preview {
            width: 120px;
            height: 120px;
            border-radius: var(--border-radius);
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            border: 2px solid #e0e0e0;
        }

        .image-preview.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(111, 0, 210, 0.1);
        }

        .image-preview-label {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #5a0099;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(111, 0, 210, 0.3);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background-color: #d0d0d0;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #da190b;
        }

        /* ===== PRODUCTS LIST ===== */
        .products-section {
            background: var(--secondary-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] .btn-primary {
            background-color: #8e3cff;
            color: #fff;
            box-shadow: 0 6px 19px rgba(147, 76, 255, 0.4);
            filter: brightness(1.1);
        }

        [data-theme="dark"] .btn-secondary,
        [data-theme="dark"] .btn-danger {
            background-color: #2f2f50;
            color: #f7f7ff;
            box-shadow: 0 6px 19px rgba(0, 0, 0, 0.4);
            filter: brightness(1.05);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--bg-light);
            border-radius: var(--border-radius);
            overflow: hidden;
            border: 2px solid #e0e0e0;
            transition: var(--transition);
        }

        .product-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .product-details {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .product-meta {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .product-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .product-actions button {
            flex: 1;
            padding: 0.7rem;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .edit-btn {
            background: var(--primary-color);
            color: white;
        }

        .edit-btn:hover {
            background: #5a0099;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .delete-btn:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
        }

        .empty-state i {
            font-size: 3rem;
            color: #ccc;
            margin-bottom: 1rem;
            display: block;
        }

        .empty-state p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* ===== ALERT MESSAGES ===== */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert i {
            font-weight: bold;
        }

        .close-alert {
            margin-left: auto;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.25rem;
            color: inherit;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 768px) {
            .header-top,
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Mobile menu overlay for all screen sizes */
        .nav-links {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background-color: var(--secondary-color);
            flex-direction: column;
            padding: 4rem 2rem 2rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            z-index: 999;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .nav-links.active {
            transform: translateX(0);
        }

        .nav-links a {
            width: 100%;
            display: block;
            padding: 1rem 1.5rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .nav-links a:hover {
            background: rgba(111, 0, 210, 0.12);
            color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

            .dashboard-title {
                font-size: 1.8rem;
            }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .form-group label {
                font-size: 0.95rem;
                margin-bottom: 0.6rem;
            }
            
            .form-group input,
            .form-group select,
            .form-group textarea {
                padding: 0.8rem 0.6rem;
                font-size: 0.95rem;
                min-height: 44px;
            }

            .tabs-nav {
                gap: 0.5rem;
            }

            .tab-btn {
                padding: 0.8rem 1rem;
                font-size: 0.9rem;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .form-actions {
                flex-direction: column;
                gap: 0.75rem;
            }

            .btn {
                width: 100%;
                justify-content: center;
                padding: 0.9rem 1.5rem;
            }
            
            .dashboard-title {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 0.8rem;
                margin: 1rem auto;
            }
            
            .navbar {
                padding: 0.5rem 0.8rem;
            }
            
            .logo {
                font-size: 1.3rem;
            }

            .dashboard-title {
                font-size: 1.2rem;
                margin-bottom: 1rem;
            }

            .form-container,
            .products-section {
                padding: 1rem 0.8rem;
                margin-bottom: 1.5rem;
            }

            .form-title {
                font-size: 1.1rem;
                margin-bottom: 1.2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            
            .form-group label {
                font-size: 0.85rem;
                margin-bottom: 0.5rem;
                font-weight: 600;
            }
            
            .form-group input,
            .form-group select,
            .form-group textarea {
                padding: 0.75rem 0.6rem;
                font-size: 0.9rem;
                min-height: 42px;
            }
            
            .form-group textarea {
                min-height: 80px;
            }

            .tabs-nav {
                gap: 0;
                margin-bottom: 1.5rem;
            }

            .tab-btn {
                padding: 0.7rem 0.8rem;
                font-size: 0.8rem;
                flex: 1;
                text-align: center;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .product-image {
                height: 150px;
                font-size: 2.5rem;
            }

            .image-preview-container {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .btn {
                padding: 0.8rem 1.2rem;
                font-size: 0.9rem;
                min-height: 44px;
            }
            
            .image-preview {
                width: 100px;
                height: 100px;
            }
        }

        @media (max-width: 360px) {
            .header-top {
                gap: 0.5rem;
            }

            .user-badge {
                font-size: 0.85rem;
            }

            .btn {
                font-size: 0.85rem;
                padding: 0.7rem 0.9rem;
            }

            .form-grid {
                gap: 0.75rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .product-image {
                height: 140px;
            }

            .product-card {
                min-height: 300px;
            }
        }

        @media (min-width: 1200px) {
            .container {
                max-width: 1260px;
            }

            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo">Campus<span>Thread</span></a>

            <div class="nav-right">
                <button id="themeToggle" class="btn" aria-label="Toggle dark/light mode">🌙</button>
                <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

            <!-- Mobile Menu Overlay -->
            <div class="mobile-menu" id="mobileMenu">
                <div class="mobile-menu-header">
                    <button class="close-menu" id="closeMenu" aria-label="Close menu">×</button>
                </div>
                <ul class="mobile-nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="index.html#universities">Universities</a></li>
                    <li><a href="index.html#brands">Brands</a></li>
                    <li><a href="vendoradmin.html">Vendor Admin</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Main Container -->

        const DEFAULT_BRANDS = ['Nike', 'Adidas', 'Puma', 'Gucci', 'Louis Vuitton', 'Zara', 'H&M'];
        const DEFAULT_CATEGORIES = [
            { id: 1, name: 'Shirt', icon: 'fas fa-shirt' },
            { id: 2, name: 'Tie', icon: 'fas fa-tie' },
            { id: 3, name: 'Socks', icon: 'fas fa-socks' },
            { id: 4, name: 'Caps', icon: 'fas fa-hat-cowboy' },
            { id: 5, name: 'Accessories', icon: 'fas fa-ring' }
        ];

        // Initialize the app when page loads
        document.addEventListener('DOMContentLoaded', function() {
            displayAvailableBrandsAndCategories();
            loadProducts();
            setupMediaUpload();
        });

        // Display available brands and categories from localStorage
        function displayAvailableBrandsAndCategories() {
            // Get brands from localStorage
            let brands = JSON.parse(localStorage.getItem('campusThreadBrands') || JSON.stringify(DEFAULT_BRANDS));
            if (brands.length === 0) {
                brands = DEFAULT_BRANDS;
            }

            // Get categories from localStorage
            let categories = JSON.parse(localStorage.getItem('campusThreadCategories') || JSON.stringify(DEFAULT_CATEGORIES));
            if (categories.length === 0) {
                categories = DEFAULT_CATEGORIES;
            }

            // Populate brand select in upload form
            const brandSelect = document.getElementById('productBrand');
            if (brandSelect) {
                brandSelect.innerHTML = '<option value="">Select Brand</option>';
                brands.forEach(brand => {
                    const option = document.createElement('option');
                    option.value = brand;
                    option.textContent = brand;
                    brandSelect.appendChild(option);
                });
            }

            // Populate category select in upload form
            const categorySelect = document.getElementById('productCategory');
            if (categorySelect) {
                categorySelect.innerHTML = '<option value="">Select Category</option>';
                categories.forEach(cat => {
                    const catObj = typeof cat === 'object' ? cat : { name: cat };
                    const option = document.createElement('option');
                    option.value = catObj.name;
                    option.textContent = catObj.name;
                    categorySelect.appendChild(option);
                });
            }

            // Populate filter brand select in My Products
            const filterBrandSelect = document.getElementById('filterBrand');
            if (filterBrandSelect) {
                filterBrandSelect.innerHTML = '<option value="">All Brands</option>';
                brands.forEach(brand => {
                    const option = document.createElement('option');
                    option.value = brand;
                    option.textContent = brand;
                    filterBrandSelect.appendChild(option);
                });
            }

            // Populate filter category select in My Products
            const filterCategorySelect = document.getElementById('filterCategory');
            if (filterCategorySelect) {
                filterCategorySelect.innerHTML = '<option value="">All Categories</option>';
                categories.forEach(cat => {
                    const catObj = typeof cat === 'object' ? cat : { name: cat };
                    const option = document.createElement('option');
                    option.value = catObj.name;
                    option.textContent = catObj.name;
                    filterCategorySelect.appendChild(option);
                });
            }

            // Display available brands and categories info
            const brandsDiv = document.getElementById('availableBrands');
            if (brandsDiv) {
                brandsDiv.innerHTML = brands.map(brand => `<div>• ${brand}</div>`).join('');
            }

            // Display categories info
            const categoriesDiv = document.getElementById('availableCategories');
            if (categoriesDiv) {
                categoriesDiv.innerHTML = categories.map(cat => {
                    const catObj = typeof cat === 'object' ? cat : { name: cat };
                    return `<div>• ${catObj.name}</div>`;
                }).join('');
            }
        }

        // Setup media upload
        function setupMediaUpload() {
            const mediaInput = document.getElementById('productMedia');
            if (mediaInput) {
                mediaInput.addEventListener('change', handleMediaSelect);
            }
        }

        // Handle media selection
        function handleMediaSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file size
            if (file.size > MAX_FILE_SIZE) {
                showAlert('File size must be less than 10MB', 'error');
                event.target.value = '';
                return;
            }

            // Validate file type
            const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'video/mp4', 'video/webm'];
            if (!validTypes.includes(file.type)) {
                showAlert('Please upload a valid image (JPG, PNG, GIF) or video (MP4, WebM)', 'error');
                event.target.value = '';
                return;
            }

            selectedMediaFile = file;
            displayMediaPreview(file);
        }

        // Display media preview
        function displayMediaPreview(file) {
            const reader = new FileReader();
            const previewContainer = document.getElementById('mediaPreview');
            const previewImg = document.getElementById('previewImg');
            const previewVideo = document.getElementById('previewVideo');

            reader.onload = function(e) {
                if (file.type.startsWith('image/')) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    previewVideo.style.display = 'none';
                } else if (file.type.startsWith('video/')) {
                    previewVideo.src = e.target.result;
                    previewVideo.style.display = 'block';
                    previewImg.style.display = 'none';
                }
                previewContainer.style.display = 'block';
            };

            reader.readAsDataURL(file);
        }

        // Clear media preview
        function clearMediaPreview() {
            selectedMediaFile = null;
            document.getElementById('productMedia').value = '';
            document.getElementById('mediaPreview').style.display = 'none';
        }

        // Setup event listeners
        function setupEventListeners() {
            const brandSelect = document.getElementById('brand');
            const customBrandGroup = document.getElementById('customBrandGroup');
            
            if (brandSelect) {
                brandSelect.addEventListener('change', function() {
                    customBrandGroup.style.display = this.value === 'Other' ? 'block' : 'none';
                });
            }
        }

        // Switch tabs
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');

            if (tabName === 'products') {
                loadProducts();
            }
        }

        // Handle form submission
        // Handle form submission
        function handleSubmit(event) {
            event.preventDefault();

            if (!selectedMediaFile) {
                showAlert('Please select an image or video', 'error');
                return;
            }

            const brand = document.getElementById('productBrand').value;
            const category = document.getElementById('productCategory').value;
            const vendorSocialLink = document.getElementById('vendorSocialLink').value.trim();

            if (!brand || !category) {
                showAlert('Please select a brand and category', 'error');
                return;
            }

            if (!vendorSocialLink) {
                showAlert('Please provide your vendor social media/DM link', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const formData = {
                    id: Date.now(),
                    name: document.getElementById('productName').value,
                    price: parseFloat(document.getElementById('productPrice').value),
                    university: document.getElementById('university').value,
                    brand: brand,
                    category: category,
                    vendorSocialLink: vendorSocialLink,
                    description: document.getElementById('description').value,
                    media: e.target.result,
                    mediaType: selectedMediaFile.type,
                    mediaName: selectedMediaFile.name,
                    createdAt: new Date().toISOString()
                };

                // Get existing products
                let products = JSON.parse(localStorage.getItem('campusThreadProducts') || '[]');
                products.push(formData);
                localStorage.setItem('campusThreadProducts', JSON.stringify(products));

                // Show success message
                showAlert('Product uploaded successfully!', 'success');

                // Reset form
                document.getElementById('productForm').reset();
                selectedMediaFile = null;
                document.getElementById('mediaPreview').style.display = 'none';
            };

            reader.readAsDataURL(selectedMediaFile);
        }

        // Load and display products
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('campusThreadProducts') || '[]');
            const container = document.getElementById('productsContainer');
            const countElement = document.getElementById('productCount');

            if (countElement) {
                countElement.textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;
            }

            if (products.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>No products uploaded yet. Start by uploading your first product!</p>
                </div>`;
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${product.mediaType && product.mediaType.startsWith('video/') 
                            ? `<video style="width: 100%; height: 100%; object-fit: cover;" controls><source src="${product.media}"></video>` 
                            : `<img src="${product.media}" style="width: 100%; height: 100%; object-fit: cover;" alt="${product.name}">`
                        }
                    </div>
                    <div class="product-details">
                        <div class="product-name">${product.name}</div>
                        <div class="product-meta">
                            <span><i class="fas fa-tag"></i> ${product.category}</span>
                            <span><i class="fas fa-building"></i> ${product.university}</span>
                            <span><i class="fas fa-user"></i> ${product.brand}</span>
                        </div>
                        <div class="product-price">₦${product.price.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        // Filter My Products
        function filterMyProducts() {
            const products = JSON.parse(localStorage.getItem('campusThreadProducts') || '[]');
            const filterBrand = document.getElementById('filterBrand').value;
            const filterCategory = document.getElementById('filterCategory').value;

            let filtered = products.filter(product => {
                return (!filterBrand || product.brand === filterBrand) &&
                       (!filterCategory || product.category === filterCategory);
            });

            renderMyProducts(filtered);
        }

        // Reset product filters
        function resetProductFilters() {
            document.getElementById('filterBrand').value = '';
            document.getElementById('filterCategory').value = '';
            loadProducts();
        }

        // Render filtered products
        function renderMyProducts(products) {
            const container = document.getElementById('productsContainer');
            const countElement = document.getElementById('productCount');

            if (countElement) {
                countElement.textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;
            }

            if (products.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>No products found. Start by uploading your first product!</p>
                </div>`;
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${product.mediaType && product.mediaType.startsWith('video/') 
                            ? `<video style="width: 100%; height: 100%; object-fit: cover;" controls><source src="${product.media}"></video>` 
                            : `<img src="${product.media}" style="width: 100%; height: 100%; object-fit: cover;" alt="${product.name}">`
                        }
                    </div>
                    <div class="product-details">
                        <div class="product-name">${product.name}</div>
                        <div class="product-meta">
                            <span><i class="fas fa-tag"></i> ${product.category}</span>
                            <span><i class="fas fa-building"></i> ${product.university}</span>
                            <span><i class="fas fa-user"></i> ${product.brand}</span>
                        </div>
                        <div class="product-price">₦${product.price.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        // Show alert messages
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
                <button class="close-alert" onclick="this.parentElement.remove()">×</button>
            `;
            alertContainer.appendChild(alertDiv);

            // Auto remove after 5 seconds
            setTimeout(() => alertDiv.remove(), 5000);
        }

        // Theme mode (light/dark)
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const themeButton = document.getElementById('themeToggle');
            if (themeButton) {
                themeButton.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
            localStorage.setItem('campusThreadTheme', theme);
        }

        function initThemeToggle() {
            const savedTheme = localStorage.getItem('campusThreadTheme') || 'light';
            setTheme(savedTheme);
            const themeButton = document.getElementById('themeToggle');
            if (themeButton) {
                themeButton.addEventListener('click', () => {
                    const nextTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                    setTheme(nextTheme);
                });
            }
        }

        initThemeToggle();

        // Hamburger menu functionality
        const hamburger = document.getElementById('hamburger');
        const closeMenu = document.getElementById('closeMenu');
        const mobileMenu = document.getElementById('mobileMenu');

        function toggleMenu() {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        }

        function closeMobileMenu() {
            hamburger.classList.remove('active');
            mobileMenu.classList.remove('active');
        }

        hamburger.addEventListener('click', toggleMenu);
        closeMenu.addEventListener('click', closeMobileMenu);

        // Close menu when clicking on links
        document.querySelectorAll('.mobile-nav-links a').forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        // Close menu when clicking outside
        mobileMenu.addEventListener('click', (e) => {
            if (e.target === mobileMenu) {
                closeMobileMenu();
            }
        });
    </script>
</body>
</html>
